<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Videobooth Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Imajiwa Admin</h2>
        </div>
        <div class="nav-item active">🗂️ Manage Events</div>
        <div class="nav-item" onclick="window.location.href='/admin-dashboard.html'">💰 Riwayat Transaksi</div>
        <div class="nav-item" id="logout-btn" onclick="logout()">🚪 Logout</div>
    </div>

    <div class="main-content">
        <div class="page-title">
            <h1>Event Dashboard</h1>
            <p style="color: var(--text-muted); margin-top: 5px;">Manage and create new videobooth events.</p>
        </div>

        <!-- Create Event Card -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">✨ Create New Event</div>
            </div>
            <div class="form-group">
                <label>Event Name (Slug)</label>
                <input type="text" id="new-event-id" class="form-control" placeholder="example: wildan-ferdi (no spaces)">
            </div>
            <button class="btn btn-primary" onclick="createNewEvent()">Create & Start Configuration</button>
        </div>

        <!-- Event List Card -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">📋 Available Events List</div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Event ID</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="events-tbody">
                    <tr><td colspan="3" style="text-align: center; color: var(--text-muted);">Loading event data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/js/dashboard.js"></script>
</body>
</html>
