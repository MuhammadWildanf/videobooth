<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Transaksi - Imajiwa Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f6fa;
            --sidebar-bg: #1e1e2d;
            --sidebar-text: #a1a5b7;
            --sidebar-active: #ffffff;
            --primary: #009ef7;
            --primary-hover: #0095e8;
            --text-main: #181c32;
            --text-muted: #7e8299;
            --card-bg: #ffffff;
            --border: #e4e6ef;
            --success: #50cd89;
            --danger: #f1416c;
            --warning: #ffc700;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; min-height: 100vh; }
        
        .sidebar { width: 280px; background-color: var(--sidebar-bg); color: var(--sidebar-text); padding: 25px 0; display: flex; flex-direction: column; box-shadow: 2px 0 20px rgba(0,0,0,0.05); z-index: 10; }
        .sidebar-header { padding: 0 30px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 25px; }
        .sidebar-header h2 { color: white; font-size: 24px; font-weight: 700; letter-spacing: 0.5px; }
        .nav-item { padding: 14px 30px; cursor: pointer; transition: all 0.3s ease; font-weight: 500; display: flex; align-items: center; gap: 12px; position: relative; }
        .nav-item.active { color: var(--sidebar-active); background: rgba(255,255,255,0.08); }
        .nav-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--primary); border-radius: 0 4px 4px 0; }
        .nav-item:hover:not(.active) { color: var(--sidebar-active); background: rgba(255,255,255,0.03); }
        
        .main-content { flex: 1; padding: 50px; overflow-y: auto; display: none; }
        .page-title { margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .page-title h1 { font-size: 32px; font-weight: 700; color: #111; letter-spacing: -0.5px; }
        
        .card { background: var(--card-bg); border-radius: 16px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 30px; border: 1px solid rgba(0,0,0,0.02); }
        .card-header { margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 20px; font-weight: 600; color: #111; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; margin-bottom: 35px; }
        .stat-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.02); transition: transform 0.3s ease; position: relative; overflow: hidden; }
        .stat-box:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .stat-box h3 { font-size: 14px; color: var(--text-muted); font-weight: 600; margin-bottom: 12px; }
        .stat-box .value { font-size: 32px; font-weight: 700; color: #111; letter-spacing: -1px; }
        .stat-icon { position: absolute; right: 20px; top: 25px; font-size: 40px; opacity: 0.1; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 18px 20px; text-align: left; border-bottom: 1px dashed var(--border); }
        th { font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px; background: #fcfcfc; border-bottom: 1px solid var(--border); }
        tbody tr { transition: background 0.2s; }
        tbody tr:hover { background: #f8f9fa; }
        
        .badge { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; display: inline-block; }
        .badge-success { background: rgba(80, 205, 137, 0.15); color: var(--success); }
        .badge-danger { background: rgba(241, 65, 108, 0.15); color: var(--danger); }
        .badge-warning { background: rgba(255, 199, 0, 0.15); color: var(--warning); }
        
        #logout-btn { margin-top: auto; color: var(--danger); }
        
        .btn-sm { padding: 10px 20px; font-size: 13px; border-radius: 8px; background: white; border: 1px solid var(--border); cursor: pointer; font-weight: 600; color: var(--text-main); transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02); display: flex; align-items: center; gap: 8px; }
        .btn-sm:hover { background: #f4f6fa; border-color: #d8dbe5; transform: translateY(-1px); }
        
        @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0.4; transform: scale(0.9); } }
        .sync-indicator { width: 10px; height: 10px; background: var(--success); border-radius: 50%; display: inline-block; animation: pulse 2s infinite; margin-right: 6px; box-shadow: 0 0 8px rgba(80,205,137,0.5); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Imajiwa Admin</h2>
        </div>
        <div class="nav-item" onclick="window.location.href='/dashboard.html'">🗂️ Manage Events</div>
        <div class="nav-item active">💰 Riwayat Transaksi</div>
        <div class="nav-item" id="logout-btn" onclick="logout()">🚪 Logout</div>
    </div>

    <div class="main-content" id="main-content">
        <div class="page-title">
            <div>
                <h1>Riwayat Transaksi</h1>
                <p style="color: var(--text-muted); margin-top: 5px;">
                    <span class="sync-indicator"></span> Live Auto-Sync Active
                </p>
            </div>
            <button class="btn-sm" onclick="fetchTransactions()">🔄 Segarkan Manual</button>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-icon">💰</div>
                <h3>Total Pendapatan</h3>
                <div class="value" id="stat-revenue" style="color: var(--primary);">Rp 0</div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">✅</div>
                <h3>Transaksi Berhasil</h3>
                <div class="value" id="stat-success" style="color: var(--success);">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">⏳</div>
                <h3>Transaksi Pending</h3>
                <div class="value" id="stat-pending" style="color: var(--warning);">0</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">🧾 Daftar Transaksi</div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Waktu (WIB)</th>
                        <th>Order ID</th>
                        <th>Nama Tamu</th>
                        <th>Kontak (WA)</th>
                        <th>Nominal</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tx-body">
                    <tr><td colspan="6" style="text-align: center; color: var(--text-muted); padding: 30px;">Memuat data transaksi...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Check Login Status
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/login.html';
        } else {
            // Verify token with backend
            fetch('/api/verify-token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            }).then(res => {
                if (!res.ok) {
                    localStorage.removeItem('adminToken');
                    window.location.href = '/login.html';
                } else {
                    document.getElementById('main-content').style.display = 'block';
                    fetchTransactions();
                    setInterval(fetchTransactions, 5000);
                }
            }).catch(() => {
                document.getElementById('main-content').style.display = 'block';
                fetchTransactions();
            });
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/login.html';
        }

        async function fetchTransactions() {
            try {
                const res = await fetch('/api/admin/transactions');
                const result = await res.json();
                
                if (result.success) {
                    renderTable(result.data);
                    calculateStats(result.data);
                }
            } catch (err) {
                console.error("Gagal menarik data:", err);
            }
        }

        function calculateStats(data) {
            let totalRevenue = 0;
            let successCount = 0;
            let pendingCount = 0;

            data.forEach(tx => {
                if (tx.status === 'settlement' || tx.status === 'capture') {
                    totalRevenue += parseInt(tx.price) || 0;
                    successCount++;
                } else if (tx.status === 'pending') {
                    pendingCount++;
                }
            });

            document.getElementById('stat-revenue').innerText = 'Rp ' + totalRevenue.toLocaleString('id-ID');
            document.getElementById('stat-success').innerText = successCount;
            document.getElementById('stat-pending').innerText = pendingCount;
        }

        function renderTable(data) {
            const tbody = document.getElementById('tx-body');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-muted); padding: 30px;">Belum ada transaksi.</td></tr>';
                return;
            }

            let html = '';
            data.forEach(tx => {
                const dateObj = new Date(tx.createdAt);
                const dateStr = dateObj.toLocaleString('id-ID', { 
                    day: '2-digit', month: 'short', year: 'numeric', 
                    hour: '2-digit', minute: '2-digit'
                });

                let badgeClass = 'badge-danger';
                let statusText = 'Gagal';
                
                if (tx.status === 'settlement' || tx.status === 'capture') {
                    badgeClass = 'badge-success';
                    statusText = 'Berhasil';
                } else if (tx.status === 'pending') {
                    badgeClass = 'badge-warning';
                    statusText = 'Pending';
                }

                html += `
                    <tr>
                        <td style="color: var(--text-muted); font-size: 13px;">${dateStr}</td>
                        <td style="font-family: monospace; font-size: 12px; color: var(--primary);">${tx.orderId}</td>
                        <td style="font-weight: 500;">${tx.name}</td>
                        <td style="color: var(--text-muted); font-size: 13px;">${tx.phone}</td>
                        <td style="font-weight: 600;">Rp ${(parseInt(tx.price)||0).toLocaleString('id-ID')}</td>
                        <td><span class="badge ${badgeClass}">${statusText}</span></td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }
    </script>
</body>
</html>
