<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Transaksi - Imajiwa Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin-dashboard.css">
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Imajiwa Admin</h2>
        </div>
        <div class="nav-item" onclick="window.location.href='/dashboard.html'">🗂️ Manage Events</div>
        <div class="nav-item active">💰 Riwayat Transaksi</div>
        <div class="nav-item" id="logout-btn" onclick="logout()">🚪 Logout</div>
    </div>

    <div class="main-content" id="main-content">
        <div class="page-title">
            <div>
                <h1>Riwayat Transaksi</h1>
                <p style="color: var(--text-muted); margin-top: 5px;">
                    <span class="sync-indicator"></span> Live Auto-Sync Active
                </p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-sm" onclick="fetchTransactions()">🔄 Segarkan Manual</button>
                <button class="btn-sm" onclick="exportToCSV()" style="background: var(--success); color: white; border: none;">📥 Download Laporan (CSV)</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-icon">💰</div>
                <h3>Total Pendapatan</h3>
                <div class="value" id="stat-revenue" style="color: var(--primary);">Rp 0</div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">✅</div>
                <h3>Transaksi Berhasil</h3>
                <div class="value" id="stat-success" style="color: var(--success);">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">⏳</div>
                <h3>Transaksi Pending</h3>
                <div class="value" id="stat-pending" style="color: var(--warning);">0</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">🧾 Daftar Transaksi</div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Waktu (WIB)</th>
                        <th>Order ID</th>
                        <th>Nama Tamu</th>
                        <th>Kontak (WA)</th>
                        <th>Nominal</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tx-body">
                    <tr><td colspan="6" style="text-align: center; color: var(--text-muted); padding: 30px;">Memuat data transaksi...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/js/admin-dashboard.js"></script>
</body>
</html>
