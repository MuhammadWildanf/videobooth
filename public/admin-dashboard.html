<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videobooth - Admin Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --accent-color: #D3BB7C;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success-color: #10b981;
            --pending-color: #f59e0b;
            --danger-color: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg-color));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        
        .login-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 300px;
        }

        .login-box h2 {
            margin-top: 0;
            color: var(--accent-color);
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 16px;
            text-align: center;
            letter-spacing: 2px;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: var(--accent-color);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .login-box button:hover {
            transform: translateY(-2px);
            background: #e5d39e;
        }

        /* --- DASHBOARD UI --- */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            width: 100%;
            box-sizing: border-box;
            display: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
        }
        
        .header h1 span {
            color: var(--accent-color);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--surface-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(12px);
        }

        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
        }

        /* --- TABLE --- */
        .table-container {
            background: var(--surface-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(12px);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        th {
            background: rgba(0,0,0,0.2);
            color: var(--text-muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        td {
            font-size: 14px;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge.settlement { background: rgba(16, 185, 129, 0.2); color: var(--success-color); border: 1px solid rgba(16,185,129,0.3); }
        .badge.pending { background: rgba(245, 158, 11, 0.2); color: var(--pending-color); border: 1px solid rgba(245,158,11,0.3); }
        .badge.failed { background: rgba(239, 68, 68, 0.2); color: var(--danger-color); border: 1px solid rgba(239,68,68,0.3); }

        .btn-refresh {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-refresh:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .loading-text {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Animasi Sync Indicator */
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
        .sync-indicator {
            width: 10px; height: 10px;
            background: var(--success-color);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px var(--success-color);
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>

    <!-- LOGIN GATEWAY -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>Admin Area</h2>
            <input type="password" id="admin-pass" placeholder="Enter Password" onkeypress="if(event.key === 'Enter') checkLogin()">
            <button onclick="checkLogin()">MASUK</button>
            <p id="login-error" style="color: var(--danger-color); font-size: 13px; margin-top: 15px; display: none;">Password salah!</p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div class="dashboard-container" id="main-dashboard">
        <div class="header">
            <h1>Imajiwa <span>Dashboard</span></h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span style="font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px;">
                    <span class="sync-indicator"></span> Auto-Sync Active
                </span>
                <button class="btn-refresh" onclick="fetchTransactions()">
                    🔄 Refresh
                </button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Pendapatan</h3>
                <div class="value" id="stat-revenue">Rp 0</div>
            </div>
            <div class="stat-card">
                <h3>Transaksi Berhasil</h3>
                <div class="value" id="stat-success">0</div>
            </div>
            <div class="stat-card">
                <h3>Transaksi Pending</h3>
                <div class="value" id="stat-pending">0</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Waktu (WIB)</th>
                        <th>Order ID</th>
                        <th>Nama Tamu</th>
                        <th>Kontak (WA)</th>
                        <th>Nominal</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tx-body">
                    <tr>
                        <td colspan="6" class="loading-text">Memuat data transaksi...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // --- LOGIN LOGIC ---
        function checkLogin() {
            const pass = document.getElementById('admin-pass').value;
            // Password default sederhana (Anda bisa ganti ini nanti)
            if (pass === 'imajiwa2026' || pass === 'imajiwa123') {
                document.getElementById('login-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-dashboard').style.display = 'block';
                    fetchTransactions();
                    
                    // Mulai Auto-Sync setiap 5 detik!
                    setInterval(fetchTransactions, 5000);
                }, 500);
            } else {
                document.getElementById('login-error').style.display = 'block';
                document.getElementById('admin-pass').value = '';
            }
        }

        // --- FETCH & RENDER LOGIC ---
        async function fetchTransactions() {
            try {
                const res = await fetch('/api/admin/transactions');
                const result = await res.json();
                
                if (result.success) {
                    renderTable(result.data);
                    calculateStats(result.data);
                }
            } catch (err) {
                console.error("Gagal menarik data:", err);
            }
        }

        function calculateStats(data) {
            let totalRevenue = 0;
            let successCount = 0;
            let pendingCount = 0;

            data.forEach(tx => {
                if (tx.status === 'settlement' || tx.status === 'capture') {
                    totalRevenue += parseInt(tx.price) || 0;
                    successCount++;
                } else if (tx.status === 'pending') {
                    pendingCount++;
                }
            });

            document.getElementById('stat-revenue').innerText = 'Rp ' + totalRevenue.toLocaleString('id-ID');
            document.getElementById('stat-success').innerText = successCount;
            document.getElementById('stat-pending').innerText = pendingCount;
        }

        function renderTable(data) {
            const tbody = document.getElementById('tx-body');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="loading-text">Belum ada transaksi.</td></tr>';
                return;
            }

            let html = '';
            data.forEach(tx => {
                // Format Tanggal ke format lokal Indonesia (WIB)
                const dateObj = new Date(tx.createdAt);
                const dateStr = dateObj.toLocaleString('id-ID', { 
                    day: '2-digit', month: 'short', year: 'numeric', 
                    hour: '2-digit', minute: '2-digit'
                });

                // Tentukan warna/teks status
                let badgeClass = 'failed';
                let statusText = 'Gagal';
                
                if (tx.status === 'settlement' || tx.status === 'capture') {
                    badgeClass = 'settlement';
                    statusText = 'Berhasil';
                } else if (tx.status === 'pending') {
                    badgeClass = 'pending';
                    statusText = 'Pending';
                }

                html += `
                    <tr>
                        <td style="color: var(--text-muted);">${dateStr}</td>
                        <td style="font-family: monospace; font-size: 12px; color: var(--accent-color);">${tx.orderId}</td>
                        <td style="font-weight: 500;">${tx.name}</td>
                        <td style="color: var(--text-muted);">${tx.phone}</td>
                        <td style="font-weight: 600;">Rp ${(parseInt(tx.price)||0).toLocaleString('id-ID')}</td>
                        <td><span class="badge ${badgeClass}">${statusText}</span></td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }
    </script>
</body>
</html>
